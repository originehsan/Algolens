name: algolens
description: Competitive Programming Analytics Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0
  salomon_bottom_bar: ^3.3.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  flutter_card_swiper: ^7.0.1
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  gap: ^3.0.1
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  
  # OTP Input
  pinput: ^5.0.0

  # Relative time
  timeago: ^3.6.1

  # Network image cache
  cached_network_image: ^3.3.1

  # Staggered list animations
  flutter_staggered_animations: ^1.1.1

  # In-app review
  in_app_review: ^2.0.9

  # Features
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_tts: ^4.0.2
  url_launcher: ^6.2.6
  share_plus: ^7.2.2
  screenshot: ^2.1.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  home_widget: ^0.4.1
  workmanager: ^0.9.0
  package_info_plus: ^5.0.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  isar_generator: ^3.1.0
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
