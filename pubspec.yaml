name: algolens
description: Competitive Programming
  Analytics Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.0

  # Local Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Preferences
  shared_preferences: ^2.2.3

  # UI Sizing
  flutter_screenutil: ^5.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Icons/SVG
  flutter_svg: ^2.0.10

  # Loading
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.67.0

  # Card Swiper
  flutter_card_swiper: ^7.0.1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Spacing
  gap: ^3.0.1

  # Progress
  percent_indicator: ^4.2.3

  # Bottom Nav
  salomon_bottom_bar: ^3.3.2

  # OTP Input
  pinput: ^5.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Text to Speech
  flutter_tts: ^4.0.2

  # URL Handling
  url_launcher: ^6.2.6

  # Share
  share_plus: ^7.2.2

  # Screenshot
  screenshot: ^2.1.0

  # Network Status
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.4.0

  # Network Image Cache
  cached_network_image: ^3.3.1

  # Localization
  intl: ^0.19.0

  # Home Widget
  home_widget: ^0.4.1

  # Background Tasks
  workmanager: ^0.9.0

  # App Info
  package_info_plus: ^5.0.1

  # Relative Time
  timeago: ^3.6.1

  # Staggered Animations
  flutter_staggered_animations: ^1.1.1

  # In App Review
  in_app_review: ^2.0.9

  # Environment
  flutter_dotenv: ^5.1.0

  # Animated Text
  animated_text_kit: ^4.2.2

  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  isar_generator: ^3.1.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/
            Inter-Regular.ttf
        - asset: assets/fonts/
            Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/
            Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/
            Inter-Bold.ttf
          weight: 700
